<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Музыкальная игра</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>Кликай по клавишам!</h1>
    <div class="keys">
      <div class="key" data-key="65">A</div>
      <div class="key" data-key="83">S</div>
      <div class="key" data-key="68">D</div>
      <div class="key" data-key="70">F</div>
    </div>
  </div>
  <audio data-key="65" src="sounds/vanilla-a.mp3"></audio>
  <audio data-key="83" src="sounds/vanilla-s.mp3"></audio>
  <audio data-key="68" src="sounds/vanilla-d.mp3"></audio>
  <audio data-key="70" src="sounds/vanilla-f.mp3"></audio>
  <script src="script.js"></script>
</body>
</html>

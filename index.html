<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5rem;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .score-display {
      font-size: 1.8rem;
      margin-top: 10px;
      color: #ff6b6b;
      font-weight: bold;
    }

    .keys {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
      padding: 20px;
    }

    .key {
      width: 100px;
      height: 100px;
      background: #4a4a6a;
      border: 4px solid #8b8b9d;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: white;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 0 5px 0 #3a3a50;
      user-select: none;
    }

    .key:hover {
      background: #5a5a7a;
    }

    .playing {
      transform: translateY(5px);
      border-color: #ff6b6b;
      box-shadow: 0 2px 0 #3a3a50;
      background: #ff8e8e;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Музыкальный симулятор</h1>
    <div class="score-display">Очки: <span id="score">0</span></div>
    <button id="resetScore" style="margin-top: 20px; padding: 10px 20px; background: #ff6b6b; border: none; border-radius: 5px; color: white; cursor: pointer;">Сбросить счёт</button>
  </div>

  <div class="keys">
    <div class="key" data-key="65">A</div>
    <div class="key" data-key="83">S</div>
    <div class="key" data-key="68">D</div>
    <div class="key" data-key="70">F</div>
    <div class="key" data-key="71">G</div>
    <div class="key" data-key="72">H</div>
    <div class="key" data-key="74">J</div>
    <div class="key" data-key="75">K</div>
  </div>

  <!-- ОДИН звуковой файл лежит рядом с index.html -->
  <audio id="sharedSound" src="vanilla-a.mp3"></audio>

  <script>
    // Загружаем счёт из localStorage при загрузке страницы
    let score = localStorage.getItem('musicGameScore') ? parseInt(localStorage.getItem('musicGameScore')) : 0;
    const scoreDisplay = document.getElementById('score');
    const audio = document.getElementById('sharedSound');

    // Обновляем отображение счёта
    scoreDisplay.textContent = score;

    function playSound(e) {
      const keyCode = e.keyCode || e.target.getAttribute('data-key');
      const key = document.querySelector(`.key[data-key="${keyCode}"]`);

      // Воспроизводим ОДИН звук
      audio.currentTime = 0;
      audio.play().catch(error => {
        console.error('Ошибка воспроизведения звука:', error);
      });

      // Обновляем счёт
      score++;
      scoreDisplay.textContent = score;

      // Сохраняем в localStorage
      localStorage.setItem('musicGameScore', score);

      // Добавляем анимацию нажатия
      if (key) {
        key.classList.add('playing');
      }
    }

    function removeTransition(e) {
      if (e.propertyName !== 'transform') return;
      this.classList.remove('playing');
    }

    // Обработчик нажатия клавиш клавиатуры
    window.addEventListener('keydown', playSound);

    // Обработчик кликов мышью для всех клавиш
    const keys = document.querySelectorAll('.key');
    keys.forEach(key => {
      key.addEventListener('click', playSound);
      key.addEventListener('transitionend', removeTransition);
    });

    // Обработчик сброса счёта
    document.getElementById('resetScore').addEventListener('click', () => {
      score = 0;
      scoreDisplay.textContent = score;
      localStorage.setItem('musicGameScore', 0);
    });
  </script>
</body>
</html>

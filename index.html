<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Programmist7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #ddd;
        }

        /* Стили для вкладок */
        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }

        .tab-button {
            padding: 15px 25px;
            cursor: pointer;
            background: #f0f0f0;
            border: none;
            margin-right: 5px;
            font-size: 16px;
            transition: background 0.3s;
        }

        .tab-button:hover {
            background: #e0e0e0;
        }

        .tab-button.active {
            background: #4CAF50;
            color: white;
        }

        /* Содержимое вкладок */
        .tab-content {
            display: none;
            padding: 20px;
            background: white;
            min-height: 400px;
        }

        .tab-content.active {
            display: block;
        }

        /* Стиль для кнопки перехода на канал RuTube */
        .channel-link {
            display: inline-block;
            padding: 12px 24px;
            background: #e53935; /* красный цвет RuTube */
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
        }

        .channel-link:hover {
            background: #c62828;
            text-decoration: none;
        }

        /* Заполнитель для вкладки "Мои программы" */
        .placeholder {
            text-align: center;
            padding: 40px;
            color: #666;
            font-style: italic;
        }

        /* Кнопка для скачивания программы */
        .download-exe-button {
            display: inline-block;
            padding: 12px 30px;
            background: #FF5722;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            text-align: center;
            transition: background 0.3s, transform 0.2s;
            border: none;
            cursor: pointer;
        }

        .download-exe-button:hover {
            background: #E64A19;
            transform: translateY(-2px);
        }

        .download-exe-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Programmist7 — Мои проекты</h1>
        </header>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'videos')">Мои видео</button>
            <button class="tab-button" onclick="openTab(event, 'programs')">Мои программы</button>
        </div>

        <!-- Содержимое вкладок -->
        <div id="videos" class="tab-content active">
            <h2>Мой канал на RuTube</h2>
            <p>Перейдите на мой канал, чтобы посмотреть все видео:</p>
            <!-- ЗАМЕНИТЕ ССЫЛКУ НИЖЕ НА ВАШ РЕАЛЬНУЮ ССЫЛКУ НА КАНАЛ RUTUBE -->
            <a href="https://rutube.ru/channel/78249046"
               target="_blank"
               class="channel-link">
               🡪 Открыть мой канал RuTube
            </a>
        </div>

        <div id="programs" class="tab-content">
            <h2>Мои программы</h2>

            <div class="program-download">
                <h3>Программа HTML Create</h3>
                <p>Мощная утилита для быстрого создания HTML‑шаблонов и веб‑страниц.</p>

                <!-- Кнопка для скачивания EXE-файла -->
                <a href="HTML_Create.exe"
                   download="HTML_Create.exe"
                   class="download-exe-button">
                   🠊 Скачать HTML Create (EXE)
                </a>
            </div>
        </div>
    </div>

    <script>
        // Функция для переключения между вкладками
        function openTab(evt, tabName) {
            // Скрываем все содержимое вкладок
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(content => {
                content.classList.remove('active');
            });

            // Убираем активный класс у всех кнопок вкладок
            const tabButtons = document.querySelectorAll('.tab-button');
            tabButtons.forEach(button => {
                button.classList.remove('active');
            });

            // Показываем выбранную вкладку и делаем кнопку активной
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
